global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Mattermost metrics
  - job_name: 'mattermost'
    static_configs:
      - targets: ['<MATTERMOST_IP>:8067']
    metrics_path: /metrics

  # PostgreSQL Cluster (pg1, pg2, pg3)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['<PG1_IP>:9187']
        labels:
          instance: 'pg1'
      - targets: ['<PG2_IP>:9187']
        labels:
          instance: 'pg2'
      - targets: ['<PG3_IP>:9187']
        labels:
          instance: 'pg3'

  # Node Exporter (Host Metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['<PG1_IP>:9100']
        labels:
          instance: 'pg1'
      - targets: ['<PG2_IP>:9100']
        labels:
          instance: 'pg2'
      - targets: ['<PG3_IP>:9100']
        labels:
          instance: 'pg3'

  # HAProxy Metrics (pg1, pg2)
  - job_name: 'haproxy'
    metrics_path: /metrics
    static_configs:
      - targets: ['<PG1_IP>:8404']
        labels:
          instance: 'pg1'
      - targets: ['<PG2_IP>:8404']
        labels:
          instance: 'pg2'

  # Docker container metrics from cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['<CADVISOR_IP>:8080']
